name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    name: Run Pipeline Tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas scikit-learn matplotlib

      - name: Preprocess datasets
        run: python -m src.preprocess

      - name: Train federated model (3 rounds for CI speed)
        run: python -m src.federated_trainer --rounds 3

      - name: Run evaluation
        run: python -m src.evaluate

      - name: Run UPDRS regression
        run: python -m src.updrs_regression

      - name: Run test suite
        run: python tests/test_pipeline.py

      - name: Upload results as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: training-results
          path: |
            results/round_history.csv
            results/run_config.json
            results/figures/
          retention-days: 7
